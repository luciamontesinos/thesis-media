<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Figures — Supplementary Material</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300..700;1,6..72,300..700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:         #ffffff;
      --text:       #1a1a1a;
      --accent:     #FF0000;
      --subtle:     #666;
      --border:     #e0e0e0;
      --hover-bg:   #1a1a1a;
      --hover-text: #ffffff;
    }
    [data-theme="dark"] {
      --bg:         #0d0d0d;
      --text:       #ebebeb;
      --accent:     #FF0000;
      --subtle:     #999;
      --border:     #2a2a2a;
      --hover-bg:   #ebebeb;
      --hover-text: #0d0d0d;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Newsreader', Georgia, serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      transition: background 0.2s, color 0.2s;
    }

    .site-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.9rem 2rem;
      border-bottom: 1px solid var(--border);
    }

    .site-name {
      font-family: 'Outfit', sans-serif;
      font-weight: 300;
      font-size: 0.78rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--subtle);
      text-decoration: none;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }

    .nav-links a {
      font-family: 'Outfit', sans-serif;
      font-size: 0.78rem;
      font-weight: 400;
      color: var(--subtle);
      text-decoration: none;
      letter-spacing: 0.06em;
    }

    .nav-links a:hover { color: var(--text); }

    main {
      max-width: 780px;
      width: 100%;
      margin: 0 auto;
      padding: 3rem 2rem 5rem;
    }

    h1 {
      font-family: 'Outfit', sans-serif;
      font-weight: 600;
      font-size: 2rem;
      line-height: 1.2;
      margin-bottom: 2.5rem;
      color: var(--text);
    }

    #figure-list {
      border-top: 1px solid var(--border);
    }

    .figure-row {
      display: grid;
      grid-template-columns: 7rem 1fr 4.5rem;
      align-items: baseline;
      gap: 1rem;
      padding: 0.85rem 0;
      border-bottom: 1px solid var(--border);
      text-decoration: none;
      color: var(--text);
      transition: color 0.12s;
    }

    .figure-row:hover { color: var(--subtle); }

    .fig-id {
      font-family: 'Outfit', sans-serif;
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      color: var(--accent);
    }

    .fig-title {
      font-size: 0.97rem;
      line-height: 1.4;
    }

    .fig-type {
      font-family: 'Outfit', sans-serif;
      font-size: 0.7rem;
      font-weight: 300;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
      text-align: right;
    }

    #theme-toggle {
      position: fixed;
      bottom: 1.75rem;
      right: 1.75rem;
      z-index: 50;
      font-family: 'Outfit', sans-serif;
      font-size: 0.75rem;
      font-weight: 400;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--accent);
      padding: 0.35rem 0.85rem;
      cursor: pointer;
      letter-spacing: 0.06em;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }

    #theme-toggle:hover {
      background: var(--hover-bg);
      color: var(--hover-text);
      border-color: var(--hover-bg);
    }
  </style>
  <script>
    (function() {
      var t = localStorage.getItem('theme') || 'light';
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
</head>
<body>

  <nav class="site-nav">
    <a href="index.html" class="site-name">Supplementary Material</a>
    <div class="nav-links">
      <a href="index.html">Figures</a>
      <a href="info.html">About</a>
    </div>
  </nav>

  <main>
    <h1>List of Figures</h1>
    <div id="figure-list"></div>
  </main>

  <button id="theme-toggle" onclick="toggleTheme()"></button>

  <script src="media.js"></script>
  <script>
    function toggleTheme() {
      var current = document.documentElement.getAttribute('data-theme');
      var next = current === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
      updateToggleLabel();
    }

    function updateToggleLabel() {
      var t = document.documentElement.getAttribute('data-theme');
      document.getElementById('theme-toggle').textContent = t === 'dark' ? 'Light' : 'Dark';
    }

    var list = document.getElementById('figure-list');

    MEDIA.forEach(function(item) {
      var a = document.createElement('a');
      a.className = 'figure-row';
      a.href = 'index.html#' + item.id;

      var id = document.createElement('span');
      id.className = 'fig-id';
      id.textContent = item.id;

      var title = document.createElement('span');
      title.className = 'fig-title';
      title.textContent = item.title;

      var type = document.createElement('span');
      type.className = 'fig-type';
      type.textContent = item.type;

      a.appendChild(id);
      a.appendChild(title);
      a.appendChild(type);
      list.appendChild(a);
    });

    updateToggleLabel();
  </script>
</body>
</html>
