<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tubularium</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; font-family: monospace; }
    canvas { display: block; }

    #ui {
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 10px; z-index: 10;
    }
    .mode-btn {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.4);
      font-family: monospace; font-size: 11px;
      letter-spacing: 0.12em; text-transform: uppercase;
      padding: 7px 20px; border-radius: 3px;
      cursor: pointer; transition: background 0.18s, color 0.18s, border-color 0.18s;
      outline: none;
    }
    .mode-btn:hover {
      background: rgba(255,255,255,0.11);
      color: rgba(255,255,255,0.75);
      border-color: rgba(255,255,255,0.25);
    }
    .mode-btn.active {
      background: rgba(255,255,255,0.14);
      border-color: rgba(255,255,255,0.45);
      color: #fff;
    }

    #hint {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      color: rgba(255,255,255,0.25); font-size: 11px; pointer-events: none;
      letter-spacing: 0.07em; transition: opacity 0.4s;
    }
    #loading {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
      color: #fff; font-size: 15px; letter-spacing: 0.05em;
    }
  </style>
</head>
<body>
  <div id="loading">Loading…</div>
  <div id="ui">
    <button class="mode-btn active" id="btn-structure">structure</button>
    <button class="mode-btn"        id="btn-sequence">sequence</button>
  </div>
  <p id="hint">drag to orbit &nbsp;·&nbsp; scroll to zoom &nbsp;·&nbsp; hover a pipe to glow</p>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.169.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE           from 'three';
    import { OBJLoader }        from 'three/addons/loaders/OBJLoader.js';
    import { MTLLoader }        from 'three/addons/loaders/MTLLoader.js';
    import { OrbitControls }    from 'three/addons/controls/OrbitControls.js';
    import { EffectComposer }   from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass }       from 'three/addons/postprocessing/RenderPass.js';
    import { UnrealBloomPass }  from 'three/addons/postprocessing/UnrealBloomPass.js';
    import { ShaderPass }       from 'three/addons/postprocessing/ShaderPass.js';
    import { OutputPass }       from 'three/addons/postprocessing/OutputPass.js';

    // ── CONFIG ────────────────────────────────────────────────────────────────
    const OBJ_FILE = 'Tubularium.obj';
    const MTL_FILE = 'Tubularium.mtl';

    // LED colors left → right: red, orange, yellow, green, light blue, dark blue, purple
    const PIPE_COLORS = [
      new THREE.Color(0xff1a00),
      new THREE.Color(0xff6600),
      new THREE.Color(0xffdd00),
      new THREE.Color(0x00ee44),
      new THREE.Color(0x00ccff),
      new THREE.Color(0x0033ff),
      new THREE.Color(0xaa00ff),
    ];

    const LED_BASE_INTENSITY  = 0.8;
    const LED_HOVER_INTENSITY = 5.5;
    const CORE_MULTIPLIER     = 3.0;
    const LERP_SPEED          = 0.07;

    const BLOOM_STRENGTH  = 0.4;
    const BLOOM_RADIUS    = 0.08;
    const BLOOM_THRESHOLD = 1;

    // Sequence mode
    const SEQUENCE      = [0, 5, 3, 4];          // pipe indices, 0-based (1,6,4,5 in 1-based)
    const C_SEQ_NORMAL  = new THREE.Color(0x44aaff);  // light blue — resting pipes
    const C_SEQ_ACTIVE  = new THREE.Color(0xff44aa);  // pink — current step
    const C_SEQ_HOVER   = new THREE.Color(0x0033ee);  // dark blue — hovered pipe
    const SEQ_ADVANCE_DELAY = 500;               // ms of hovering pink before advancing

    // ── RENDERER ──────────────────────────────────────────────────────────────
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.setSize(innerWidth, innerHeight);
    renderer.toneMapping         = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.0;
    document.body.appendChild(renderer.domElement);

    // ── SCENE / CAMERA ────────────────────────────────────────────────────────
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x07070e);

    const camera = new THREE.PerspectiveCamera(45, innerWidth / innerHeight, 0.001, 500);
    camera.position.set(0, 1, 1);

    // ── LIGHTS ────────────────────────────────────────────────────────────────
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
    scene.add(ambientLight);

    const keyLight = new THREE.DirectionalLight(0xffffff, 0.9);
    keyLight.position.set(3, 6, 4);
    scene.add(keyLight);

    const rimLight = new THREE.DirectionalLight(0x8899ff, 0.3);
    rimLight.position.set(-4, 2, -3);
    scene.add(rimLight);

    // ── ORBIT CONTROLS ────────────────────────────────────────────────────────
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.06;

    // ── SELECTIVE BLOOM ───────────────────────────────────────────────────────
    const BLOOM_SCENE = 1;
    const bloomLayer  = new THREE.Layers();
    bloomLayer.set(BLOOM_SCENE);

    const bloomComposer = new EffectComposer(renderer);
    bloomComposer.renderToScreen = false;
    bloomComposer.addPass(new RenderPass(scene, camera));
    bloomComposer.addPass(new UnrealBloomPass(
      new THREE.Vector2(innerWidth, innerHeight),
      BLOOM_STRENGTH, BLOOM_RADIUS, BLOOM_THRESHOLD
    ));

    const maskTarget = new THREE.WebGLRenderTarget(innerWidth, innerHeight);

    const mixPass = new ShaderPass(
      new THREE.ShaderMaterial({
        uniforms: {
          baseTexture:  { value: null },
          bloomTexture: { value: bloomComposer.renderTarget2.texture },
          maskTexture:  { value: maskTarget.texture },
        },
        vertexShader: `
          varying vec2 vUv;
          void main() {
            vUv = uv;
            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
          }`,
        fragmentShader: `
          uniform sampler2D baseTexture;
          uniform sampler2D bloomTexture;
          uniform sampler2D maskTexture;
          varying vec2 vUv;
          void main() {
            float mask = texture2D(maskTexture, vUv).r;
            gl_FragColor = texture2D(baseTexture, vUv)
                         + texture2D(bloomTexture, vUv) * (1.0 - mask);
          }`,
      }),
      'baseTexture'
    );
    mixPass.needsSwap = true;

    const finalComposer = new EffectComposer(renderer);
    finalComposer.addPass(new RenderPass(scene, camera));
    finalComposer.addPass(mixPass);
    finalComposer.addPass(new OutputPass());

    const savedMats = {};
    const darkMat   = new THREE.MeshBasicMaterial({ color: 0x000000 });
    const whiteMat  = new THREE.MeshBasicMaterial({ color: 0xffffff });

    function darkenNonBloomed(obj) {
      if (!obj.isMesh || bloomLayer.test(obj.layers)) return;
      savedMats[obj.uuid] = obj.material;
      obj.material = darkMat;
    }
    function restoreMaterial(obj) {
      if (!obj.isMesh || !savedMats[obj.uuid]) return;
      obj.material = savedMats[obj.uuid];
      delete savedMats[obj.uuid];
    }

    const maskSaved = {};
    function renderMask() {
      scene.traverse(obj => {
        if (!obj.isMesh) return;
        maskSaved[obj.uuid] = obj.material;
        obj.material = bloomLayer.test(obj.layers) ? darkMat : whiteMat;
      });
      renderer.setRenderTarget(maskTarget);
      renderer.render(scene, camera);
      renderer.setRenderTarget(null);
      scene.traverse(obj => {
        if (!maskSaved[obj.uuid]) return;
        obj.material = maskSaved[obj.uuid];
        delete maskSaved[obj.uuid];
      });
    }

    // ── MATERIAL FACTORIES ────────────────────────────────────────────────────
    function makePipeMaterial(col) {
      return new THREE.MeshStandardMaterial({
        color:               new THREE.Color(0xffffff),
        emissive:            col.clone(),
        emissiveIntensity:   LED_BASE_INTENSITY,
        roughness:           0.85,
        metalness:           0.0,
        side:                THREE.FrontSide,
        polygonOffset:       true,
        polygonOffsetFactor: 2,
        polygonOffsetUnits:  2,
      });
    }

    function makeCoreMaterial(col) {
      return new THREE.MeshStandardMaterial({
        color:             new THREE.Color(0x000000),
        emissive:          col.clone(),
        emissiveIntensity: LED_BASE_INTENSITY * CORE_MULTIPLIER,
        roughness:         0.0,
        metalness:         0.0,
      });
    }

    function makeMetalMaterial(origMat) {
      const n = origMat?.name ?? '';
      if (n.includes('Polished'))
        return new THREE.MeshLambertMaterial({ color: 0x2a2a2c });
      if (n.includes('Steel') || n.includes('Anodized'))
        return new THREE.MeshLambertMaterial({ color: 0x1a1a1c });
      return new THREE.MeshLambertMaterial({ color: 0x0e0e10 });
    }

    // ── LED CORE GEOMETRY ─────────────────────────────────────────────────────
    function createLedCore(pipe, col) {
      const box    = new THREE.Box3().setFromObject(pipe);
      const size   = box.getSize(new THREE.Vector3());
      const center = box.getCenter(new THREE.Vector3());

      const longest  = Math.max(size.x, size.y, size.z);
      const shortest = Math.min(size.x, size.y, size.z);
      const height   = longest  * 0.92;
      const radius   = Math.max(shortest * 0.06, 0.0005);

      const geo = new THREE.CylinderGeometry(radius, radius, height, 8);
      if      (longest === size.x) geo.applyMatrix4(new THREE.Matrix4().makeRotationZ(Math.PI / 2));
      else if (longest === size.z) geo.applyMatrix4(new THREE.Matrix4().makeRotationX(Math.PI / 2));

      const core = new THREE.Mesh(geo, makeCoreMaterial(col));
      core.position.copy(center);
      core.userData.isLedCore        = true;
      core.userData.targetColor      = col.clone();
      core.userData.targetIntensity  = LED_BASE_INTENSITY * CORE_MULTIPLIER;
      core.userData.currentIntensity = LED_BASE_INTENSITY * CORE_MULTIPLIER;
      return core;
    }

    // ── MODEL LOADING ─────────────────────────────────────────────────────────
    const ledPipes = [];
    const ledCores = [];

    function onModelLoad(obj) {
      const rawPipes = [];

      obj.traverse(node => {
        if (!(node instanceof THREE.Mesh)) return;
        if ((node.material?.name ?? '').includes('Translucent')) {
          rawPipes.push(node);
          node.userData.isLedPipe = true;
        } else {
          node.material = makeMetalMaterial(node.material);
        }
      });

      obj.rotation.x = -Math.PI / 2;
      obj.updateMatrixWorld(true);

      const bbox    = new THREE.Box3().setFromObject(obj);
      const bCenter = bbox.getCenter(new THREE.Vector3());
      const bSize   = bbox.getSize(new THREE.Vector3());
      obj.position.sub(bCenter);
      scene.add(obj);
      obj.updateMatrixWorld(true);

      rawPipes.sort((a, b) => {
        const ax = new THREE.Box3().setFromObject(a).getCenter(new THREE.Vector3()).x;
        const bx = new THREE.Box3().setFromObject(b).getCenter(new THREE.Vector3()).x;
        return ax - bx;
      });

      rawPipes.forEach((pipe, i) => {
        const col = PIPE_COLORS[i];
        pipe.material = makePipeMaterial(col);
        pipe.userData.pipeIndex        = i;
        pipe.userData.targetColor      = col.clone();
        pipe.userData.targetIntensity  = LED_BASE_INTENSITY;
        pipe.userData.currentIntensity = LED_BASE_INTENSITY;
        pipe.layers.enable(BLOOM_SCENE);
        ledPipes.push(pipe);

        const core = createLedCore(pipe, col);
        core.userData.pipeIndex = i;
        core.layers.enable(BLOOM_SCENE);
        ledCores.push(core);
        scene.add(core);
      });

      const maxDim = Math.max(bSize.x, bSize.y, bSize.z);
      camera.position.set(0, maxDim * 0.3, maxDim * 2.0);
      controls.minDistance = maxDim * 0.15;
      controls.maxDistance = maxDim * 10;
      controls.update();

      document.getElementById('loading').style.display = 'none';
      console.info(`Tubularium — ${ledPipes.length} LED pipes detected`);
    }

    function onProgress(e) {
      if (e.lengthComputable)
        document.getElementById('loading').textContent =
          `Loading… ${Math.round(e.loaded / e.total * 100)}%`;
    }
    function onError(err) {
      console.error(err);
      document.getElementById('loading').textContent = 'Error loading model — check console.';
    }

    new MTLLoader().load(
      MTL_FILE,
      (mats) => { mats.preload(); const o = new OBJLoader(); o.setMaterials(mats); o.load(OBJ_FILE, onModelLoad, onProgress, onError); },
      undefined,
      () => new OBJLoader().load(OBJ_FILE, onModelLoad, onProgress, onError)
    );

    // ── APP STATE ─────────────────────────────────────────────────────────────
    let appMode        = 'structure';
    let seqStep        = 0;
    let seqAdvanceTimer = null;

    // ── LERP HELPERS ──────────────────────────────────────────────────────────
    function setTarget(mesh, col, intensity) {
      if (!mesh) return;
      if (!mesh.userData.targetColor) mesh.userData.targetColor = col.clone();
      else mesh.userData.targetColor.copy(col);
      mesh.userData.targetIntensity = intensity;
    }

    function lerpMesh(mesh) {
      if (!mesh?.material) return;
      mesh.userData.currentIntensity +=
        (mesh.userData.targetIntensity - mesh.userData.currentIntensity) * LERP_SPEED;
      mesh.material.emissiveIntensity = mesh.userData.currentIntensity;
      if (mesh.userData.targetColor)
        mesh.material.emissive.lerp(mesh.userData.targetColor, LERP_SPEED);
    }

    // ── MODE SWITCHING ────────────────────────────────────────────────────────
    function setMode(mode) {
      appMode      = mode;
      hoveredIndex = -1;
      document.body.style.cursor = 'default';

      if (seqAdvanceTimer !== null) {
        clearTimeout(seqAdvanceTimer);
        seqAdvanceTimer = null;
      }

      document.getElementById('btn-structure').classList.toggle('active', mode === 'structure');
      document.getElementById('btn-sequence').classList.toggle('active',  mode === 'sequence');

      if (mode === 'structure') {
        ambientLight.intensity = 0.5;
        keyLight.intensity     = 0.9;
        rimLight.intensity     = 0.3;
        ledPipes.forEach((pipe, i) => {
          setTarget(pipe,         PIPE_COLORS[i], LED_BASE_INTENSITY);
          setTarget(ledCores[i],  PIPE_COLORS[i], LED_BASE_INTENSITY * CORE_MULTIPLIER);
        });
        document.getElementById('hint').textContent =
          'drag to orbit · scroll to zoom · hover a pipe to glow';
      } else {
        ambientLight.intensity = 0.02;
        keyLight.intensity     = 0.03;
        rimLight.intensity     = 0.02;
        seqStep = 0;
        const activeIdx = SEQUENCE[seqStep];
        ledPipes.forEach((pipe, i) => {
          const col = i === activeIdx ? C_SEQ_ACTIVE : C_SEQ_NORMAL;
          setTarget(pipe,        col, LED_BASE_INTENSITY);
          setTarget(ledCores[i], col, LED_BASE_INTENSITY * CORE_MULTIPLIER);
        });
        document.getElementById('hint').textContent =
          'hover any pipe to illuminate · hover the pink pipe to advance';
      }
    }

    // ── SEQUENCE ADVANCE ──────────────────────────────────────────────────────
    function advanceSequence() {
      seqStep = (seqStep + 1) % SEQUENCE.length;
      const activeIdx = SEQUENCE[seqStep];
      ledPipes.forEach((pipe, i) => {
        const col = i === activeIdx ? C_SEQ_ACTIVE : C_SEQ_NORMAL;
        setTarget(pipe,        col, LED_BASE_INTENSITY);
        setTarget(ledCores[i], col, LED_BASE_INTENSITY * CORE_MULTIPLIER);
      });
      // Keep the currently hovered pipe at hover color (it's no longer the active one)
      if (hoveredIndex >= 0) {
        setTarget(ledPipes[hoveredIndex],  C_SEQ_HOVER, LED_HOVER_INTENSITY);
        setTarget(ledCores[hoveredIndex],  C_SEQ_HOVER, LED_HOVER_INTENSITY * CORE_MULTIPLIER);
      }
    }

    // ── HOVER ─────────────────────────────────────────────────────────────────
    const raycaster = new THREE.Raycaster();
    const pointer   = new THREE.Vector2(-9, -9);
    let   hoveredIndex = -1;

    addEventListener('mousemove', e => {
      pointer.x =  (e.clientX / innerWidth)  * 2 - 1;
      pointer.y = -(e.clientY / innerHeight) * 2 + 1;
    });

    function restoreToBase(idx) {
      if (idx < 0) return;
      if (appMode === 'structure') {
        setTarget(ledPipes[idx],  PIPE_COLORS[idx], LED_BASE_INTENSITY);
        setTarget(ledCores[idx],  PIPE_COLORS[idx], LED_BASE_INTENSITY * CORE_MULTIPLIER);
      } else {
        const col = idx === SEQUENCE[seqStep] ? C_SEQ_ACTIVE : C_SEQ_NORMAL;
        setTarget(ledPipes[idx],  col, LED_BASE_INTENSITY);
        setTarget(ledCores[idx],  col, LED_BASE_INTENSITY * CORE_MULTIPLIER);
      }
    }

    function applyHover(idx) {
      if (idx < 0) return;
      if (appMode === 'structure') {
        setTarget(ledPipes[idx],  PIPE_COLORS[idx], LED_HOVER_INTENSITY);
        setTarget(ledCores[idx],  PIPE_COLORS[idx], LED_HOVER_INTENSITY * CORE_MULTIPLIER);
      } else {
        setTarget(ledPipes[idx],  C_SEQ_HOVER, LED_HOVER_INTENSITY);
        setTarget(ledCores[idx],  C_SEQ_HOVER, LED_HOVER_INTENSITY * CORE_MULTIPLIER);
        if (idx === SEQUENCE[seqStep]) {
          seqAdvanceTimer = setTimeout(() => {
            seqAdvanceTimer = null;
            advanceSequence();
          }, SEQ_ADVANCE_DELAY);
        }
      }
    }

    function updateHover() {
      raycaster.setFromCamera(pointer, camera);
      const hits     = raycaster.intersectObjects(ledPipes, false);
      const newIndex = hits.length > 0 ? hits[0].object.userData.pipeIndex : -1;
      if (newIndex === hoveredIndex) return;

      if (hoveredIndex >= 0) {
        restoreToBase(hoveredIndex);
        if (seqAdvanceTimer !== null) {
          clearTimeout(seqAdvanceTimer);
          seqAdvanceTimer = null;
        }
      }

      applyHover(newIndex);
      hoveredIndex = newIndex;
      document.body.style.cursor = newIndex >= 0 ? 'pointer' : 'default';
    }

    // ── RESIZE ────────────────────────────────────────────────────────────────
    addEventListener('resize', () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
      bloomComposer.setSize(innerWidth, innerHeight);
      finalComposer.setSize(innerWidth, innerHeight);
      maskTarget.setSize(innerWidth, innerHeight);
    });

    // ── BUTTON LISTENERS ──────────────────────────────────────────────────────
    document.getElementById('btn-structure').addEventListener('click', () => setMode('structure'));
    document.getElementById('btn-sequence').addEventListener('click',  () => setMode('sequence'));

    // ── RENDER LOOP ───────────────────────────────────────────────────────────
    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      updateHover();
      ledPipes.forEach(lerpMesh);
      ledCores.forEach(lerpMesh);

      scene.traverse(darkenNonBloomed);
      bloomComposer.render();
      scene.traverse(restoreMaterial);

      renderMask();
      finalComposer.render();
    }

    animate();
  </script>
</body>
</html>
